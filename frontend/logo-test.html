<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Logo Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles/wordmark.css">
<style>
body{margin:0;background:#07071a;color:#F8FAFF;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:60px;padding:40px}
h3{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:rgba(248,250,255,.4);margin-bottom:-20px}
</style>
</head>
<body>

<h3>Stacked XL (splash)</h3>
<button class="metis-mark size-xl stacked" type="button">
  <img class="mm-glyph" src="/static/assets/metis-logomark-transparent.png" alt="">
  <span class="mm-stack">
    <span class="mm-word">Metis</span>
    <span class="mm-sub gradient" style="background:linear-gradient(135deg,rgba(167,139,250,.9),rgba(251,113,133,.9));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">Director's Console</span>
  </span>
</button>

<h3>Horizontal XL (old)</h3>
<button class="metis-mark size-xl" type="button">
  <img class="mm-glyph" src="/static/assets/metis-logomark-transparent.png" alt="">
  <span class="mm-stack">
    <span class="mm-word">Metis</span>
    <span class="mm-sub">Command</span>
  </span>
</button>

<h3>Sidebar (size-sm, stays horizontal)</h3>
<button class="metis-mark size-sm" type="button">
  <img class="mm-glyph" src="/static/assets/metis-logomark-transparent.png" alt="">
  <span class="mm-stack">
    <span class="mm-word">Metis</span>
    <span class="mm-sub">Command</span>
  </span>
</button>

</body>
</html>
