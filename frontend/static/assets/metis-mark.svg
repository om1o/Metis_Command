<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true" role="img">
  <defs>
    <!-- Heritage gradient: violet → magenta → coral, matches the design system primary -->
    <linearGradient id="mm-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#C026D3"/>
      <stop offset="100%" stop-color="#FB7185"/>
    </linearGradient>

    <!-- Top-down sheen for that subtle "polished glass" look -->
    <linearGradient id="mm-sheen" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"  stop-color="white" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft inner glow behind the starburst -->
    <radialGradient id="mm-glow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%"   stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle drop on the starburst itself for crisper edges over the gradient -->
    <filter id="mm-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.8"/>
      <feOffset dx="0" dy="0.6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded base tile -->
  <rect width="64" height="64" rx="16" ry="16" fill="url(#mm-bg)"/>

  <!-- Top sheen -->
  <rect width="64" height="36" rx="16" ry="16" fill="url(#mm-sheen)"/>

  <!-- Inner glow halo -->
  <circle cx="32" cy="32" r="22" fill="url(#mm-glow)"/>

  <!-- 4-point compass starburst — bigger & cleaner than the 8-point reference,
       reads instantly at favicon size and still looks intentional at 96px -->
  <path d="M32 6
           L35 28
           L58 32
           L35 36
           L32 58
           L29 36
           L6 32
           L29 28 Z"
        fill="white"
        filter="url(#mm-shadow)"/>

  <!-- Tiny center dot for extra polish -->
  <circle cx="32" cy="32" r="2" fill="rgba(124,58,237,0.65)"/>
</svg>
