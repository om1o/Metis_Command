<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Analytics · Metis</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/static/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --vi:#7C3AED;--vi2:#A78BFA;--co:#FB7185;--am:#F59E0B;--bl:#3B82F6;--gr:#22C55E;
  --bg:#07071a;--bg-2:#0d0d24;--panel:rgba(255,255,255,.04);--panel-2:rgba(255,255,255,.06);
  --text:#F8FAFF;--muted:rgba(248,250,255,.6);--subtle:rgba(248,250,255,.32);
  --border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.14);
  --grad:linear-gradient(135deg,var(--vi),var(--co) 55%,var(--am));
  --accent:#7C3AED;--accent-soft:rgba(124,58,237,.18);--accent-glow:rgba(124,58,237,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;background:
  radial-gradient(circle at 12% 8%,rgba(124,58,237,.18),transparent 50%),
  radial-gradient(circle at 90% 100%,rgba(251,113,133,.10),transparent 55%);
  z-index:0;pointer-events:none}

.page{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:36px 28px 60px}

/* Header */
.page-head{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.back-btn{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:9px;background:var(--panel);border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s}
.back-btn:hover{background:var(--panel-2);border-color:var(--border-2);color:var(--text)}
.back-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none}
.page-title{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.02em;flex:1}
.page-title em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.refresh-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;background:var(--panel);border:1px solid var(--border);color:var(--subtle);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.refresh-btn:hover{background:var(--accent-soft);border-color:var(--accent);color:var(--text)}
.refresh-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;fill:none}
.gen-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--subtle)}

/* Stat cards grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:28px}
.stat-card{padding:20px;border-radius:14px;background:var(--panel);border:1px solid var(--border);display:flex;flex-direction:column;gap:6px;transition:border-color .2s}
.stat-card:hover{border-color:var(--border-2)}
.stat-icon{font-size:22px;margin-bottom:2px}
.stat-value{font-family:'Sora',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.02em;line-height:1}
.stat-label{font-size:12px;color:var(--muted);font-weight:500}
.stat-sub{font-size:11px;color:var(--subtle);font-family:'JetBrains Mono',monospace;margin-top:2px}
.stat-card.accent{border-color:color-mix(in srgb,var(--accent) 35%,transparent);background:var(--accent-soft)}
.stat-card.green{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.05)}
.stat-card.amber{border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.05)}
.stat-card.blue{border-color:rgba(59,130,246,.25);background:rgba(59,130,246,.05)}

/* Section */
.section{margin-bottom:28px}
.section-title{font-family:'Sora',sans-serif;font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--subtle);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:"";flex:1;height:1px;background:var(--border)}

/* Mission status bar */
.status-bar-wrap{display:flex;flex-direction:column;gap:8px}
.status-row{display:flex;align-items:center;gap:10px;font-size:13px}
.status-label{width:80px;color:var(--muted);font-weight:500;flex-shrink:0}
.status-track{flex:1;height:8px;border-radius:6px;background:var(--panel-2);overflow:hidden}
.status-fill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.status-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--subtle);width:32px;text-align:right;flex-shrink:0}
.fill-success{background:var(--gr)}
.fill-failed{background:var(--co)}
.fill-running{background:var(--vi)}
.fill-other{background:var(--subtle)}

/* Token model breakdown */
.model-list{display:flex;flex-direction:column;gap:6px}
.model-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--panel);border:1px solid var(--border)}
.model-name{flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.model-calls{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--subtle);flex-shrink:0}
.model-tokens{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);flex-shrink:0}
.model-cost{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--vi2);flex-shrink:0;width:60px;text-align:right}

/* Wallet bar */
.wallet-track{height:12px;border-radius:8px;background:var(--panel-2);overflow:hidden;margin:10px 0 6px}
.wallet-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--gr),var(--am));transition:width .7s cubic-bezier(.22,1,.36,1)}
.wallet-labels{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--subtle)}

/* Two-col layout for lower sections */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.two-col{grid-template-columns:1fr}}

/* Detail card */
.detail-card{padding:18px;border-radius:13px;background:var(--panel);border:1px solid var(--border)}
.detail-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.detail-row:last-child{border-bottom:none}
.detail-key{color:var(--muted);font-weight:500}
.detail-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);font-weight:600}

/* Loading / error */
.loading{text-align:center;padding:80px 20px;color:var(--subtle)}
.loading svg{width:36px;height:36px;stroke:var(--subtle);fill:none;stroke-width:1.5;opacity:.4;margin-bottom:16px;animation:spin 1.4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{text-align:center;padding:60px 20px;color:var(--co)}
</style>
</head>
<body>

<div class="page" id="page">
  <div class="loading" id="loadingState">
    <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    <p>Loading analytics…</p>
  </div>
</div>

<script type="module">
import { api, ensureAuthed } from '/static/js/api.js?v=v18';

const page = document.getElementById('page');

function fmt(n) {
  if (n === undefined || n === null) return '—';
  if (n >= 1_000_000) return (n/1_000_000).toFixed(1) + 'M';
  if (n >= 1_000)     return (n/1_000).toFixed(1) + 'K';
  return String(n);
}
function fmtUsd(n) {
  if (!n) return '$0.00';
  return '$' + Number(n).toFixed(4);
}
function fmtCents(c) {
  if (!c) return '$0.00';
  return '$' + (c/100).toFixed(2);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function load() {
  try {
    await ensureAuthed();
  } catch {}

  let data;
  try {
    data = await api.analytics();
  } catch (e) {
    page.innerHTML = `<div class="error-msg">
      <p style="font-size:32px;margin-bottom:12px">⚠️</p>
      <p>Could not load analytics: ${esc(e.message)}</p>
      <a href="/app" style="display:inline-block;margin-top:18px;color:var(--vi2)">← Back to Metis</a>
    </div>`;
    return;
  }

  const s  = data.sessions  || {};
  const m  = data.missions  || {};
  const sc = data.schedules || {};
  const t  = data.tokens    || {};
  const w  = data.wallet    || {};
  const ib = data.inbox     || {};
  const ts = new Date(data.generated_at).toLocaleTimeString();

  // Mission status breakdown
  const byStatus   = m.by_status || {};
  const totalMiss  = m.total || 0;
  const statusRows = Object.entries(byStatus)
    .sort(([,a],[,b]) => b - a)
    .map(([status, count]) => {
      const pct  = totalMiss ? Math.round(count/totalMiss*100) : 0;
      const cls  = status==='success'?'fill-success':status==='failed'?'fill-failed':status==='running'?'fill-running':'fill-other';
      return `<div class="status-row">
        <span class="status-label">${esc(status)}</span>
        <div class="status-track"><div class="status-fill ${cls}" style="width:${pct}%"></div></div>
        <span class="status-count">${count}</span>
      </div>`;
    }).join('') || '<div style="color:var(--subtle);font-size:13px;padding:8px 0">No missions recorded yet</div>';

  // Token model breakdown
  const byModel = t.by_model || {};
  const modelRows = Object.entries(byModel)
    .sort(([,a],[,b]) => (b.tokens||0) - (a.tokens||0))
    .slice(0, 8)
    .map(([model, stats]) => `
      <div class="model-row">
        <span class="model-name">${esc(model)}</span>
        <span class="model-calls">${fmt(stats.calls||0)} calls</span>
        <span class="model-tokens">${fmt(stats.tokens||0)} tok</span>
        <span class="model-cost">${fmtUsd(stats.cost_usd||0)}</span>
      </div>`)
    .join('') || '<div style="color:var(--subtle);font-size:13px;padding:8px 0">No token usage recorded yet</div>';

  // Wallet spend bar
  const spentPct = w.cap_cents ? Math.min(100, Math.round(w.spent_cents/w.cap_cents*100)) : 0;

  page.innerHTML = `
    <div class="page-head">
      <a href="/app" class="back-btn">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>
      <h1 class="page-title"><em>Analytics</em> Dashboard</h1>
      <span class="gen-time">as of ${esc(ts)}</span>
      <button class="refresh-btn" id="refreshBtn">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Refresh
      </button>
    </div>

    <div class="stat-grid">
      <div class="stat-card accent">
        <div class="stat-icon">💬</div>
        <div class="stat-value">${fmt(s.total)}</div>
        <div class="stat-label">Total sessions</div>
        <div class="stat-sub">${fmt(s.active_last_7d)} active last 7 days</div>
      </div>
      <div class="stat-card green">
        <div class="stat-icon">🎯</div>
        <div class="stat-value">${fmt(m.total)}</div>
        <div class="stat-label">Missions run</div>
        <div class="stat-sub">${fmt(m.success)} succeeded · ${fmt(m.failed)} failed</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-icon">⚡</div>
        <div class="stat-value">${fmt(sc.total)}</div>
        <div class="stat-label">Automations</div>
        <div class="stat-sub">${fmt(sc.active)} currently active</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🧠</div>
        <div class="stat-value">${fmt(t.total)}</div>
        <div class="stat-label">Tokens used</div>
        <div class="stat-sub">${fmt(t.calls)} AI calls · ${fmtUsd(t.cost_usd)} est.</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-icon">📬</div>
        <div class="stat-value">${fmt(ib.total)}</div>
        <div class="stat-label">Inbox items</div>
        <div class="stat-sub">${fmt(ib.unread)} unread</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💳</div>
        <div class="stat-value">${fmtCents(w.spent_cents)}</div>
        <div class="stat-label">Monthly spend</div>
        <div class="stat-sub">cap: ${fmtCents(w.cap_cents)}</div>
      </div>
    </div>

    <div class="two-col">
      <div>
        <div class="section">
          <div class="section-title">Mission outcomes</div>
          <div class="status-bar-wrap">${statusRows}</div>
        </div>

        <div class="section">
          <div class="section-title">Budget usage</div>
          <div class="detail-card">
            <div class="wallet-track">
              <div class="wallet-fill" style="width:${spentPct}%"></div>
            </div>
            <div class="wallet-labels">
              <span>Spent ${fmtCents(w.spent_cents)}</span>
              <span>${spentPct}% of ${fmtCents(w.cap_cents)} cap</span>
            </div>
          </div>
        </div>
      </div>

      <div>
        <div class="section">
          <div class="section-title">Overview</div>
          <div class="detail-card">
            <div class="detail-row"><span class="detail-key">Sessions (7d)</span><span class="detail-val">${fmt(s.active_last_7d)}</span></div>
            <div class="detail-row"><span class="detail-key">Active automations</span><span class="detail-val">${fmt(sc.active)} / ${fmt(sc.total)}</span></div>
            <div class="detail-row"><span class="detail-key">Mission success rate</span><span class="detail-val">${totalMiss ? Math.round(m.success/totalMiss*100) : 0}%</span></div>
            <div class="detail-row"><span class="detail-key">AI calls</span><span class="detail-val">${fmt(t.calls)}</span></div>
            <div class="detail-row"><span class="detail-key">Total tokens</span><span class="detail-val">${fmt(t.total)}</span></div>
            <div class="detail-row"><span class="detail-key">Estimated cost</span><span class="detail-val">${fmtUsd(t.cost_usd)}</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Token usage by model</div>
      <div class="model-list">${modelRows}</div>
    </div>
  `;

  document.getElementById('refreshBtn').addEventListener('click', () => {
    page.innerHTML = '<div class="loading" id="loadingState"><svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg><p>Refreshing…</p></div>';
    load();
  });
}

load();
</script>
</body>
</html>
