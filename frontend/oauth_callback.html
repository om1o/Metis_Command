<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Signing in… · Metis</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/static/assets/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--vi:#7C3AED;--co:#FB7185;--am:#F59E0B;--bg:#07071a;--text:#F8FAFF;--muted:rgba(248,250,255,.55)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 30% 20%,rgba(124,58,237,.25),transparent 60%),radial-gradient(circle at 70% 80%,rgba(251,113,133,.18),transparent 60%);z-index:0}
.box{position:relative;z-index:1;text-align:center}
.spinner{width:54px;height:54px;border:3px solid rgba(255,255,255,.12);border-top-color:var(--vi);border-radius:50%;margin:0 auto 24px;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h1{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;margin-bottom:8px;letter-spacing:-.01em}
p{font-size:14px;color:var(--muted)}
.error{display:none;margin-top:18px;padding:12px 16px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;border-radius:12px;font-size:13px;max-width:420px;line-height:1.5}
.error.show{display:block}
.error a{color:#FDA4AF;text-decoration:underline}
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <h1 id="title">Completing sign-in…</h1>
  <p id="msg">Securing your session.</p>
  <div id="err" class="error"></div>
</div>

<script type="module">
import { api, setSession } from '/static/js/api.js?v=v19';

const params = new URLSearchParams(window.location.search);
const code = params.get('code');
const errParam = params.get('error_description') || params.get('error');

const title = document.getElementById('title');
const msg = document.getElementById('msg');
const err = document.getElementById('err');

function fail(detail) {
  document.querySelector('.spinner').style.display = 'none';
  title.textContent = 'Sign-in failed';
  msg.textContent = '';
  err.classList.add('show');
  err.innerHTML = `${detail}<br><br><a href="/login">← Back to sign in</a>`;
}

if (errParam) {
  fail(errParam);
} else if (!code) {
  fail('No authorization code returned by the provider.');
} else {
  (async () => {
    try {
      const state = params.get('state');
      const out = await api.oauthComplete(code, state);
      if (!out.session?.access_token) {
        fail('Sign-in completed but no session was returned.');
        return;
      }
      setSession(out.session, out.user);
      window.location.replace('/splash');
    } catch (e) {
      fail(e.message || 'Could not complete sign-in.');
    }
  })();
}
</script>
</body>
</html>
