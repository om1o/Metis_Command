<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Metis</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/static/assets/favicon.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7C3AED">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Metis">
<link rel="apple-touch-icon" href="/static/assets/metis-logomark-transparent.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles/wordmark.css?v=v20">
<script src="/static/js/wordmark.js?v=v20" defer></script>
<style>
:root{--vi:#7C3AED;--vi2:#A78BFA;--co:#FB7185;--am:#F59E0B;--bl:#3B82F6;--gr:#22C55E;--bg:#07071a;--text:#F8FAFF;--muted:rgba(248,250,255,.55);--subtle:rgba(248,250,255,.32);--grad:linear-gradient(135deg,var(--vi),var(--co) 55%,var(--am))}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}

/* mesh background */
.mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.55}
.orb1{width:680px;height:680px;background:radial-gradient(circle,rgba(124,58,237,.7),transparent 70%);animation:drift1 14s ease-in-out infinite}
.orb2{width:520px;height:520px;background:radial-gradient(circle,rgba(251,113,133,.6),transparent 70%);animation:drift2 18s ease-in-out infinite}
.orb3{width:580px;height:580px;background:radial-gradient(circle,rgba(245,158,11,.4),transparent 70%);animation:drift3 22s ease-in-out infinite}
.orb4{width:420px;height:420px;background:radial-gradient(circle,rgba(59,130,246,.45),transparent 70%);animation:drift4 16s ease-in-out infinite}
@keyframes drift1{0%{transform:translate(-15%,-25%)}50%{transform:translate(8%,-5%)}100%{transform:translate(-15%,-25%)}}
@keyframes drift2{0%{transform:translate(70%,55%)}50%{transform:translate(50%,35%)}100%{transform:translate(70%,55%)}}
@keyframes drift3{0%{transform:translate(75%,-15%)}50%{transform:translate(55%,15%)}100%{transform:translate(75%,-15%)}}
@keyframes drift4{0%{transform:translate(-5%,75%)}50%{transform:translate(15%,55%)}100%{transform:translate(-5%,75%)}}
.mesh::after{content:"";position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");background-size:220px;opacity:.7}

.stage{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:42px;padding:32px}

/* Splash entry animation */
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.stage > .metis-mark{animation:rise .8s cubic-bezier(.22,1,.36,1) both}
.stage > .metis-mark .mm-glyph{animation:bob 4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-6px) rotate(2deg)}}

/* Progress + steps */
.progress-wrap{width:480px;max-width:90vw;animation:rise .8s .35s cubic-bezier(.22,1,.36,1) both;opacity:0}
.bar-track{height:3px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;position:relative}
.bar-fill{position:absolute;left:0;top:0;bottom:0;width:0;background:var(--grad);border-radius:99px;transition:width .4s cubic-bezier(.22,1,.36,1);box-shadow:0 0 12px rgba(124,58,237,.6)}
.steps{margin-top:22px;display:flex;flex-direction:column;gap:9px}
.step{display:flex;align-items:center;gap:12px;font-size:13.5px;color:var(--muted);transition:color .3s}
.step.done{color:var(--text)}
.step.active{color:#fff}
.step-icon{width:18px;height:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:10px}
.step-icon .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .3s}
.step.done .step-icon .dot{background:var(--gr);box-shadow:0 0 10px rgba(34,197,94,.55);animation:pop .35s ease}
.step.active .step-icon{position:relative}
.step.active .step-icon .dot{display:none}
.step.active .step-icon::after{content:"";width:14px;height:14px;border:1.5px solid rgba(255,255,255,.18);border-top-color:var(--vi2);border-radius:50%;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(.4)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.step.fail{color:#FCA5A5}
.step.fail .step-icon .dot{background:#EF4444;box-shadow:0 0 10px rgba(239,68,68,.55)}
.step .label{flex:1;font-weight:500}
.step .meta{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--subtle)}

.foot{position:absolute;bottom:28px;font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--subtle);letter-spacing:.12em;text-transform:uppercase}
.foot span{color:var(--vi2)}

/* Error retry banner */
.error-banner{display:none;margin-top:18px;padding:11px 14px;border-radius:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;font-size:13px;text-align:center}
.error-banner.show{display:block;animation:rise .3s ease}
.error-banner button{margin-top:8px;background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#FECACA;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600}
.error-banner button:hover{background:rgba(239,68,68,.3)}

/* Fade-out for transition */
body.leaving{animation:fadeOut .5s cubic-bezier(.4,0,.6,1) forwards}
@keyframes fadeOut{to{opacity:0;transform:scale(.98)}}
</style>
</head>
<body>

<div class="mesh">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>

<div class="stage">
  <button class="metis-mark size-xl stacked" type="button" title="Refresh">
    <img class="mm-glyph" src="/static/assets/metis-logomark-transparent.png" alt="">
    <span class="mm-stack">
      <span class="mm-word">Metis</span>
      <span class="mm-sub gradient">Director's Console</span>
    </span>
  </button>

  <div class="progress-wrap">
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
    <div class="steps" id="steps"></div>
    <div class="error-banner" id="err">
      <div id="errMsg"></div>
      <button id="retry">Retry</button>
    </div>
  </div>
</div>

<div class="foot">Boot sequence Â· <span id="ver">vâ€”</span></div>

<script type="module">
import { api, getToken, ensureAuthed, setSession } from '/static/js/api.js?v=v20';

const STEPS = [
  { id: 'boot',    label: 'Initializing runtime',         run: bootRuntime },
  { id: 'auth',    label: 'Verifying your session',       run: bootAuth },
  { id: 'ollama',  label: 'Starting your AI brain',       run: bootOllama },
  { id: 'config',  label: 'Loading Manager configuration', run: bootConfig },
  { id: 'status',  label: 'Pinging the runtime',          run: bootStatus },
  { id: 'models',  label: 'Discovering available models',  run: bootModels },
  { id: 'sessions',label: 'Pulling your sessions',         run: bootSessions },
  { id: 'crew',    label: 'Waking the crew',               run: bootCrew },
];

const stepsEl = document.getElementById('steps');
const bar = document.getElementById('bar');
const errBanner = document.getElementById('err');
const errMsg = document.getElementById('errMsg');
const retryBtn = document.getElementById('retry');

// Render placeholders
const elements = STEPS.map(s => {
  const el = document.createElement('div');
  el.className = 'step';
  el.id = `step-${s.id}`;
  el.innerHTML = `<div class="step-icon"><span class="dot"></span></div><div class="label">${s.label}</div><div class="meta"></div>`;
  stepsEl.appendChild(el);
  return el;
});

let routeNext = '/app';

async function runBoot() {
  errBanner.classList.remove('show');
  for (let i = 0; i < STEPS.length; i++) {
    const s = STEPS[i];
    const el = elements[i];
    el.classList.add('active');
    const t0 = performance.now();
    try {
      const res = await s.run();
      const ms = Math.max(1, performance.now() - t0) | 0;
      el.classList.remove('active');
      el.classList.add('done');
      el.querySelector('.meta').textContent = `${ms}ms${res ? ' Â· ' + res : ''}`;
      bar.style.width = `${((i + 1) / STEPS.length * 100).toFixed(1)}%`;
      // Brief pause between steps so the animation feels purposeful, not jittery.
      await new Promise(r => setTimeout(r, 90));
    } catch (e) {
      el.classList.remove('active');
      el.classList.add('fail');
      el.querySelector('.meta').textContent = 'failed';
      errMsg.textContent = e.message || `Step "${s.label}" failed`;
      errBanner.classList.add('show');
      return;
    }
  }
  // All green â€” fade out and route into the app.
  await new Promise(r => setTimeout(r, 250));
  document.body.classList.add('leaving');
  setTimeout(() => window.location.replace(routeNext), 460);
}

// â”€â”€ Step implementations â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
async function bootRuntime() {
  // No-op; lets the animation breathe.
  await new Promise(r => setTimeout(r, 180));
  return 'ready';
}

async function bootAuth() {
  if (!getToken()) {
    // Try the local install bootstrap token first (works on localhost without a cloud account)
    try {
      const res = await fetch('/auth/local-token');
      if (res.ok) {
        const { token } = await res.json();
        if (token) {
          localStorage.setItem('metis.access_token', token);
        }
      }
    } catch {}
  }
  if (!getToken()) {
    routeNext = '/login';
    return 'no session â€” going to login';
  }
  const u = await ensureAuthed();
  if (!u) {
    // If cloud auth failed, try refreshing with local token
    try {
      const res = await fetch('/auth/local-token');
      if (res.ok) {
        const { token } = await res.json();
        if (token) {
          localStorage.setItem('metis.access_token', token);
          const { user } = await api.me();
          if (user) return user.email || 'local install';
        }
      }
    } catch {}
    routeNext = '/login';
    return 'session expired';
  }
  return u.email || 'authed';
}

async function bootOllama() {
  // Customer-friendly: don't ask anyone to run a server. We start it ourselves.
  if (routeNext !== '/app') return 'skipped';
  try {
    const s = await api.ollamaStatus();
    if (s.running) return 'already running';
    if (!s.installed) return 'not installed (cloud only)';
    // Ask the backend to spawn `ollama serve` and wait for it.
    const r = await api.ollamaStart();
    if (r.ok) return r.already_running ? 'already running' : 'started';
    return r.message || 'unavailable';
  } catch {
    return 'skipped';
  }
}

async function bootConfig() {
  if (routeNext !== '/app') return 'skipped';
  try {
    const r = await api.managerConfig();
    if (!r.is_configured) {
      routeNext = '/setup';
      return 'first-time setup';
    }
    return r.config?.manager_name ? `Manager: ${r.config.manager_name}` : 'loaded';
  } catch (e) {
    routeNext = '/setup';
    return 'needs setup';
  }
}

async function bootStatus() {
  if (routeNext !== '/app') return 'skipped';
  const s = await api.status();
  document.getElementById('ver').textContent = `v${s.version}`;
  return s.ollama?.reachable ? `${s.ollama.model_count} models local` : 'cloud only';
}

async function bootModels() {
  if (routeNext !== '/app') return 'skipped';
  try {
    const r = await api.models();
    const n = (r.models || []).length;
    return `${n} model${n === 1 ? '' : 's'} available`;
  } catch {
    return 'none';
  }
}

async function bootSessions() {
  if (routeNext !== '/app') return 'skipped';
  try {
    const s = await api.sessions();
    const n = (s || []).length;
    return n ? `${n} session${n === 1 ? '' : 's'}` : 'none yet';
  } catch {
    return 'unavailable';
  }
}

async function bootCrew() {
  if (routeNext !== '/app') return 'skipped';
  try {
    const a = await api.agents();
    const n = (a.agents || []).length;
    return `${n} agents`;
  } catch {
    return 'offline';
  }
}

retryBtn.addEventListener('click', () => {
  // Reset visual state and re-run.
  elements.forEach(el => { el.className = 'step'; el.querySelector('.meta').textContent = ''; });
  bar.style.width = '0';
  routeNext = '/app';
  runBoot();
});

runBoot();
</script>
</body>
</html>
