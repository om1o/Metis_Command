<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Setup · Metis</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="/static/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/polish/global-polish.v2.css?v=v17">
<link rel="stylesheet" href="/static/styles/wordmark.css?v=v17">
<script src="/static/js/wordmark.js?v=v17" defer></script>
<style>
:root{--vi:#7C3AED;--vi2:#A78BFA;--co:#FB7185;--am:#F59E0B;--bl:#3B82F6;--gr:#22C55E;--bg:#07071a;--text:#F8FAFF;--muted:rgba(248,250,255,.6);--subtle:rgba(248,250,255,.32);--border:rgba(255,255,255,.1);--border-2:rgba(255,255,255,.18);--panel:rgba(255,255,255,.05);--panel-2:rgba(255,255,255,.08);--grad:linear-gradient(135deg,var(--vi),var(--co) 55%,var(--am))}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{cursor:auto}
#mp-dot,#mp-ring,#mp-grain{display:none!important}

.mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.45}
.orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(124,58,237,.7),transparent 70%);animation:drift1 16s ease-in-out infinite}
.orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(251,113,133,.55),transparent 70%);animation:drift2 20s ease-in-out infinite}
.orb3{width:520px;height:520px;background:radial-gradient(circle,rgba(245,158,11,.4),transparent 70%);animation:drift3 24s ease-in-out infinite}
@keyframes drift1{0%{transform:translate(-25%,-30%)}50%{transform:translate(0%,-10%)}100%{transform:translate(-25%,-30%)}}
@keyframes drift2{0%{transform:translate(75%,60%)}50%{transform:translate(60%,40%)}100%{transform:translate(75%,60%)}}
@keyframes drift3{0%{transform:translate(85%,-15%)}50%{transform:translate(65%,15%)}100%{transform:translate(85%,-15%)}}

/* Header */
.head{position:relative;z-index:1;padding:24px 32px;display:flex;align-items:center;gap:14px}
.head .brand{display:flex;align-items:center;gap:10px}
.head .brand img{width:30px;height:30px;filter:drop-shadow(0 0 12px rgba(124,58,237,.5))}
.head .brand span{font-family:'Sora',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.01em}
.head .step-counter{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--subtle);letter-spacing:.16em;text-transform:uppercase}
.head .step-counter b{color:var(--vi2)}

/* Progress dots */
.dots{position:relative;z-index:1;display:flex;justify-content:center;gap:7px;margin:8px 0 24px}
.dot{width:32px;height:3px;border-radius:99px;background:rgba(255,255,255,.1);transition:all .3s}
.dot.active{background:var(--grad);box-shadow:0 0 8px rgba(124,58,237,.5)}
.dot.done{background:rgba(167,139,250,.5)}

/* Stage */
.stage{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 32px 32px}

.step-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:20px;padding:36px 40px;backdrop-filter:blur(30px);box-shadow:0 24px 60px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.08);animation:slideIn .4s cubic-bezier(.22,1,.36,1)}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.step-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--vi2);margin-bottom:10px;font-weight:600}
.step-title{font-family:'Sora',sans-serif;font-size:32px;font-weight:800;letter-spacing:-.025em;line-height:1.1;margin-bottom:12px}
.step-title em{font-family:Georgia,serif;font-style:italic;font-weight:400;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.step-sub{font-size:14.5px;color:var(--muted);line-height:1.6;margin-bottom:28px;max-width:56ch}

.field{margin-bottom:18px}
.field label{display:block;font-size:12.5px;font-weight:600;color:rgba(248,250,255,.75);margin-bottom:8px;letter-spacing:.01em}
.field input,.field textarea,.field select{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:11px;padding:14px 14px;font-family:inherit;font-size:14.5px;color:var(--text);outline:none;transition:all .2s}
.field input::placeholder,.field textarea::placeholder{color:var(--subtle)}
.field input:hover,.field textarea:hover,.field select:hover{border-color:var(--border-2);background:rgba(255,255,255,.08)}
.field input:focus,.field textarea:focus,.field select:focus{background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.55);box-shadow:0 0 0 4px rgba(124,58,237,.13)}
.field textarea{resize:vertical;min-height:90px;line-height:1.55}
.field .hint{font-size:12px;color:var(--subtle);margin-top:6px;line-height:1.5}

.row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* Avatar + color picker */
.avatar-preview{display:flex;align-items:center;gap:14px;padding:14px;background:var(--panel);border:1px solid var(--border);border-radius:14px;margin-bottom:8px}
.avatar-disc{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-weight:800;font-size:18px;color:#fff;flex-shrink:0;transition:background .25s}
.avatar-meta{flex:1}
.avatar-meta .n{font-family:'Sora',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.01em}
.avatar-meta .s{font-size:12px;color:var(--muted);margin-top:2px}
.color-row{display:flex;gap:8px;flex-wrap:wrap}
.color-swatch{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s}
.color-swatch:hover{transform:scale(1.08)}
.color-swatch.active{border-color:#fff}

/* Persona cards */
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.preset-card{padding:16px;border-radius:14px;border:1.5px solid var(--border);background:var(--panel);cursor:pointer;transition:all .2s;text-align:left;font-family:inherit;color:var(--text);display:flex;flex-direction:column;gap:6px}
.preset-card:hover{background:var(--panel-2);border-color:var(--border-2);transform:translateY(-2px)}
.preset-card.selected{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.6);box-shadow:0 0 0 4px rgba(124,58,237,.1)}
.preset-card .name{font-weight:700;font-size:14px;color:var(--text)}
.preset-card .blurb{font-size:12.5px;color:var(--muted);line-height:1.5}
.preset-card.selected .name{color:var(--vi2)}

/* Model select grid */
.model-grid{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;padding-right:4px}
.model-grid::-webkit-scrollbar{width:6px}
.model-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
.model-card{padding:13px 16px;border-radius:11px;border:1.5px solid var(--border);background:var(--panel);cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px}
.model-card:hover{background:var(--panel-2);border-color:var(--border-2)}
.model-card.selected{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.6)}
.model-card .ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700}
.model-card .ico.local{background:rgba(34,197,94,.15);color:#86EFAC;border:1px solid rgba(34,197,94,.3)}
.model-card .ico.cloud{background:rgba(124,58,237,.15);color:var(--vi2);border:1px solid rgba(124,58,237,.4)}
.model-card .body{flex:1;min-width:0}
.model-card .body .n{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.model-card .body .d{font-size:11.5px;color:var(--subtle);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.model-card .check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border-2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.model-card.selected .check{background:var(--vi);border-color:var(--vi)}
.model-card.selected .check::after{content:"";width:6px;height:10px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg) translate(-1px,-1px)}

/* Specialist toggles */
.spec-list{display:flex;flex-direction:column;gap:8px}
.spec-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:11px;background:var(--panel);border:1px solid var(--border);transition:all .2s}
.spec-row.on{background:rgba(124,58,237,.08);border-color:rgba(124,58,237,.3)}
.spec-row .body{flex:1}
.spec-row .name{font-weight:600;font-size:13.5px}
.spec-row .blurb{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.45}
.toggle{position:relative;width:36px;height:20px;background:rgba(255,255,255,.12);border-radius:99px;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle.on{background:var(--vi)}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s,background .2s}
.toggle.on::after{left:18px}

/* Footer / actions */
.actions{display:flex;align-items:center;gap:12px;margin-top:28px;padding-top:24px;border-top:1px solid var(--border)}
.btn{height:46px;padding:0 22px;border-radius:11px;border:none;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .18s}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);background:var(--panel);border-color:var(--border-2)}
.btn-primary{background:var(--grad);color:#fff;position:relative;overflow:hidden}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 30px rgba(124,58,237,.4)}
.btn-primary:disabled{opacity:.6;cursor:wait;transform:none}
.spacer{flex:1}

.banner{display:none;margin-bottom:18px;padding:11px 14px;border-radius:10px;font-size:13px;line-height:1.45}
.banner.show{display:block}
.banner.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#FCA5A5}

@media(max-width:720px){.row-2,.preset-grid{grid-template-columns:1fr}.step-card{padding:24px}}
</style>
</head>
<body>

<div class="mesh">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<header class="head">
  <button class="metis-mark size-sm" type="button" title="Refresh">
    <img class="mm-glyph" src="/static/assets/metis-mark.svg?v=v18" alt="">
    <span class="mm-word">Metis</span>
  </button>
  <div class="step-counter">Setup · <b id="counter">1 / 6</b></div>
</header>

<div class="dots" id="dots"></div>

<div class="stage" id="stage">
  <!-- Content rendered by JS -->
</div>

<script type="module">
import { api, ensureAuthed, clearSession } from '/static/js/api.js?v=v17';

const TOTAL_STEPS = 7;
let stepIdx = 0;
let presets = [];
let availableModels = [];
let specOptions = [];
let cfg = {
  manager_name: 'Atlas',
  persona_key: 'atlas',
  manager_persona: '',
  manager_model: '',
  company_name: 'Metis Command',
  company_mission: '',
  director_name: 'Director',
  director_about: '',
  accent_color: '#7C3AED',
  specialists: ['Genius', 'Researcher', 'Coder', 'Thinker', 'Scholar'],
};

// ── Boot ─────────────────────────────────────────────────────────────────
const user = await ensureAuthed();
if (user) {
  const guess = (user.email || '').split('@')[0] || '';
  if (guess) cfg.director_name = guess.replace(/[._-]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

try {
  const r = await api.managerConfig();
  presets = r.presets || [];
  specOptions = r.specialists || [];
  if (r.is_configured) Object.assign(cfg, r.config || {});
} catch (e) {
  console.warn('config load:', e);
}
try {
  const m = await api.models();
  availableModels = m.models || [];
} catch {}

// Pre-pick a sensible default Manager model (manager-class small local).
if (!cfg.manager_model && availableModels.length) {
  const preferOrder = ['qwen3.5:4b', 'qwen3:4b', 'qwen3.6', 'glm4:9b', 'llama3.2:3b', 'qwen2.5-coder:7b', 'qwen2.5-coder:1.5b'];
  const local = availableModels.filter(m => m.kind === 'local');
  const preferred = preferOrder.map(p => local.find(m => m.id === p)).find(Boolean);
  cfg.manager_model = preferred ? preferred.id : (local[0] || availableModels[0]).id;
}

// ── Step renderers ──────────────────────────────────────────────────────
const COLORS = ['#7C3AED', '#FB7185', '#F59E0B', '#3B82F6', '#22C55E', '#EC4899'];

function header(eyebrow, title, sub) {
  return `<div class="step-eyebrow">${eyebrow}</div>
          <h1 class="step-title">${title}</h1>
          <p class="step-sub">${sub}</p>`;
}

const STEPS = [
  // Step 1 — Welcome / Company
  () => `${header('Step 1 of 7', 'Welcome to <em>your</em> AI company.', 'Let\'s set up the Manager who will run the room. First, what do you want to call your company?')}
    <div class="field">
      <label>Company name</label>
      <input type="text" id="companyName" maxlength="60" value="${esc(cfg.company_name)}" placeholder="Metis Command">
      <div class="hint">This is the umbrella for your Manager and crew. You can change it later.</div>
    </div>
    <div class="field">
      <label>Mission / what you do <span style="color:var(--subtle)">(optional)</span></label>
      <textarea id="companyMission" maxlength="240" placeholder="e.g. Help me ship products faster, write better, and make better decisions.">${esc(cfg.company_mission)}</textarea>
      <div class="hint">A 1–2 sentence north star your Manager will keep in mind.</div>
    </div>`,

  // Step 2 — Manager identity
  () => `${header('Step 2 of 7', 'Name your <em>Manager</em>.', 'Give them a name and a color. This is who you\'ll talk to every day.')}
    <div class="field">
      <label>Manager name</label>
      <input type="text" id="managerName" maxlength="40" value="${esc(cfg.manager_name)}" placeholder="Atlas">
    </div>
    <div class="avatar-preview">
      <div class="avatar-disc" id="avPrev" style="background:${cfg.accent_color}">${initials(cfg.manager_name)}</div>
      <div class="avatar-meta">
        <div class="n" id="avName">${esc(cfg.manager_name) || 'Atlas'}</div>
        <div class="s" id="avSub">Manager · ${esc(cfg.company_name)}</div>
      </div>
    </div>
    <div class="field">
      <label>Accent color</label>
      <div class="color-row">
        ${COLORS.map(c => `<div class="color-swatch ${c === cfg.accent_color ? 'active' : ''}" data-color="${c}" style="background:${c}"></div>`).join('')}
      </div>
    </div>`,

  // Step 3 — Personality
  () => `${header('Step 3 of 7', 'Pick a <em>personality</em>.', 'How should ' + esc(cfg.manager_name) + ' talk to you? Each preset fills in a starting prompt — you can edit it directly below.')}
    <div class="preset-grid">
      ${presets.map(p => `
        <button type="button" class="preset-card ${p.key === cfg.persona_key ? 'selected' : ''}" data-key="${p.key}">
          <div class="name">${esc(p.name)}</div>
          <div class="blurb">${esc(p.blurb)}</div>
        </button>
      `).join('')}
    </div>
    <div class="field" id="customWrap">
      <label>System prompt <span style="color:var(--subtle)">— edit anything you want</span></label>
      <textarea id="customPersona" rows="8" placeholder="You are {manager_name}, the Manager of {company_name}. You're…">${esc(currentPersonaText())}</textarea>
      <div class="hint">Use <code>{manager_name}</code>, <code>{company_name}</code>, <code>{director_name}</code> as placeholders. Pick a preset above to load its starting text, or write your own from scratch.</div>
      <button type="button" id="resetPersonaBtn" class="btn btn-ghost" style="margin-top:10px;height:36px;padding:0 14px;font-size:12.5px">↺ Reset to preset</button>
    </div>`,

  // Step 4 — Model
  () => availableModels.length ? `${header('Step 4 of 7', 'Choose your <em>model</em>.', 'Which AI brain should power the Manager? Local models are private (run on your machine). Cloud models are faster + smarter but cost API credits.')}
    <div class="model-grid">
      ${availableModels.map(m => `
        <div class="model-card ${m.id === cfg.manager_model ? 'selected' : ''}" data-id="${esc(m.id)}">
          <div class="ico ${m.kind}">${m.kind === 'local' ? 'LOC' : 'CLD'}</div>
          <div class="body">
            <div class="n">${esc(m.label)}</div>
            <div class="d">${esc(m.note)}</div>
          </div>
          <div class="check"></div>
        </div>
      `).join('')}
    </div>` : `${header('Step 4 of 7', 'Choose your <em>model</em>.', 'No models found yet. Make sure Ollama is running, or set GLM_API_KEY / GROQ_API_KEY in your .env to enable cloud routes.')}<div class="banner show error">No models available. You can finish setup and we'll detect them when they come online.</div>`,

  // Step 5 — Director profile + notification preferences
  () => `${header('Step 5 of 7', 'Tell <em>' + esc(cfg.manager_name) + '</em> about you.', 'Whatever ' + esc(cfg.manager_name) + ' knows about you can be used to give better answers. The notification fields are how the manager reaches you when an automation finishes or a subagent has a question.')}
    <div class="field">
      <label>What should ${esc(cfg.manager_name)} call you?</label>
      <input type="text" id="directorName" maxlength="40" value="${esc(cfg.director_name)}" placeholder="Your name">
    </div>
    <div class="field">
      <label>About you <span style="color:var(--subtle)">(role, projects, preferences — anything)</span></label>
      <textarea id="directorAbout" rows="6" placeholder="e.g. Software engineer building a product company. Prefer concise answers with code samples. Working on Metis (an AI orchestrator). I read fast, ship fast.">${esc(cfg.director_about)}</textarea>
      <div class="hint">This is added to ${esc(cfg.manager_name)}'s system prompt so it persists across every conversation.</div>
    </div>
    <div class="row-2">
      <div class="field">
        <label>Notification email <span style="color:var(--subtle)">(optional)</span></label>
        <input type="email" id="notificationEmail" maxlength="120" value="${esc(cfg.notification_email || '')}" placeholder="you@example.com">
        <div class="hint">For task-complete pings.</div>
      </div>
      <div class="field">
        <label>Notification phone <span style="color:var(--subtle)">(optional)</span></label>
        <input type="tel" id="notificationPhone" maxlength="20" value="${esc(cfg.notification_phone || '')}" placeholder="+1 555 555 5555">
        <div class="hint">SMS / call alerts via Twilio.</div>
      </div>
    </div>`,

  // Step 6 — Email sending credentials (used by the AI to send mail FROM you)
  () => `${header('Step 6 of 7', 'Give <em>' + esc(cfg.manager_name) + '</em> an email account.', 'These credentials let the AI send messages on your behalf — confirmation pings, automation reports, replies you ask it to draft and send. Stored locally only (encrypted at rest is on the roadmap; gitignored either way). <strong>Use a Gmail App Password</strong>, never your real Google password.')}
    <div class="field">
      <label>Email username (the address the AI sends FROM) <span style="color:var(--subtle)">(optional)</span></label>
      <input type="email" id="emailUsername" maxlength="120" value="${esc(cfg.email_username || '')}" placeholder="you-or-an-alias@gmail.com" autocomplete="off">
      <div class="hint">Tip: create a dedicated Gmail alias just for the AI so you can revoke it later.</div>
    </div>
    <div class="field">
      <label>App password <span style="color:var(--subtle)">(optional)</span></label>
      <input type="password" id="emailPassword" maxlength="120" value="${esc(cfg.email_password || '')}" placeholder="16-character app password" autocomplete="new-password">
      <div class="hint">Get one at <code>myaccount.google.com → Security → 2-Step Verification → App passwords</code>. <strong>Never paste your real account password.</strong></div>
    </div>
    <div class="row-2">
      <div class="field">
        <label>SMTP host</label>
        <input type="text" id="emailSmtpHost" maxlength="120" value="${esc(cfg.email_smtp_host || 'smtp.gmail.com')}" placeholder="smtp.gmail.com">
      </div>
      <div class="field">
        <label>SMTP port</label>
        <input type="number" id="emailSmtpPort" min="1" max="65535" value="${cfg.email_smtp_port || 465}">
        <div class="hint">465 (SSL) or 587 (STARTTLS).</div>
      </div>
    </div>
    <div class="banner show" style="background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.25);color:#FBBF24;padding:12px 14px;border-radius:10px;margin-top:12px;font-size:12.5px;line-height:1.5">
      ⚠ This password sits on disk in plaintext (gitignored). It's safe-ish on a single-user machine but anyone with file access can read it. A future update moves these into the Vault.
    </div>`,

  // Step 7 — Specialists / Crew
  () => `${header('Step 7 of 7', 'Build your <em>crew</em>.', esc(cfg.manager_name) + ' delegates to specialists when their depth helps. Toggle which ones are part of your team — you can always change this later.')}
    <div class="spec-list">
      ${specOptions.map(s => `
        <div class="spec-row ${cfg.specialists.includes(s.key) ? 'on' : ''}" data-key="${s.key}">
          <div class="body">
            <div class="name">${esc(s.label)}</div>
            <div class="blurb">${esc(s.blurb)}</div>
          </div>
          <div class="toggle ${cfg.specialists.includes(s.key) ? 'on' : ''}"></div>
        </div>
      `).join('')}
    </div>`,
];

// ── Render ──────────────────────────────────────────────────────────────
const stage = document.getElementById('stage');
const dots = document.getElementById('dots');

function renderDots() {
  dots.innerHTML = '';
  for (let i = 0; i < TOTAL_STEPS; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === stepIdx ? ' active' : i < stepIdx ? ' done' : '');
    dots.appendChild(d);
  }
}

function renderStep() {
  document.getElementById('counter').textContent = `${stepIdx + 1} / ${TOTAL_STEPS}`;
  renderDots();
  const card = document.createElement('div');
  card.className = 'step-card';
  card.innerHTML = STEPS[stepIdx]() + `
    <div class="actions">
      ${stepIdx > 0 ? '<button class="btn btn-ghost" id="backBtn">← Back</button>' : ''}
      <div class="spacer"></div>
      <button class="btn btn-primary" id="nextBtn">${stepIdx === TOTAL_STEPS - 1 ? '✨ Finish setup' : 'Continue →'}</button>
    </div>`;
  stage.innerHTML = '';
  stage.appendChild(card);
  attachStepHandlers();
}

function attachStepHandlers() {
  document.getElementById('nextBtn').addEventListener('click', next);
  const back = document.getElementById('backBtn');
  if (back) back.addEventListener('click', () => { saveStepInputs(); stepIdx = Math.max(0, stepIdx - 1); renderStep(); });

  if (stepIdx === 1) {
    const nameEl = document.getElementById('managerName');
    nameEl.addEventListener('input', () => {
      cfg.manager_name = nameEl.value.trim() || 'Atlas';
      document.getElementById('avPrev').textContent = initials(cfg.manager_name);
      document.getElementById('avName').textContent = cfg.manager_name;
    });
    document.querySelectorAll('.color-swatch').forEach(el => {
      el.addEventListener('click', () => {
        cfg.accent_color = el.dataset.color;
        document.getElementById('avPrev').style.background = cfg.accent_color;
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('active', s === el));
      });
    });
  }

  if (stepIdx === 2) {
    const ta = document.getElementById('customPersona');
    document.querySelectorAll('.preset-card').forEach(el => {
      el.addEventListener('click', () => {
        cfg.persona_key = el.dataset.key;
        document.querySelectorAll('.preset-card').forEach(c => c.classList.toggle('selected', c === el));
        // Load the preset's starting text into the textarea so the user can edit.
        // (Preserves any existing custom edits ONLY if they had picked Custom.)
        const preset = presets.find(p => p.key === cfg.persona_key);
        const seed = (preset?.system || '').trim();
        ta.value = seed;
        cfg.manager_persona = seed;
      });
    });
    // As the user types, save into cfg in real time so it survives Back/Forward.
    ta.addEventListener('input', () => { cfg.manager_persona = ta.value; });
    document.getElementById('resetPersonaBtn').addEventListener('click', () => {
      const preset = presets.find(p => p.key === cfg.persona_key);
      const seed = (preset?.system || '').trim();
      ta.value = seed;
      cfg.manager_persona = seed;
    });
  }

  if (stepIdx === 3) {
    document.querySelectorAll('.model-card').forEach(el => {
      el.addEventListener('click', () => {
        cfg.manager_model = el.dataset.id;
        document.querySelectorAll('.model-card').forEach(c => c.classList.toggle('selected', c === el));
      });
    });
  }

  if (stepIdx === 6) {
    document.querySelectorAll('.spec-row').forEach(el => {
      el.addEventListener('click', () => {
        const key = el.dataset.key;
        const i = cfg.specialists.indexOf(key);
        if (i >= 0) cfg.specialists.splice(i, 1);
        else cfg.specialists.push(key);
        el.classList.toggle('on');
        el.querySelector('.toggle').classList.toggle('on');
      });
    });
  }
}

function saveStepInputs() {
  if (stepIdx === 0) {
    cfg.company_name = (document.getElementById('companyName')?.value || '').trim() || 'Metis Command';
    cfg.company_mission = (document.getElementById('companyMission')?.value || '').trim();
  } else if (stepIdx === 1) {
    cfg.manager_name = (document.getElementById('managerName')?.value || '').trim() || 'Atlas';
  } else if (stepIdx === 2) {
    cfg.manager_persona = (document.getElementById('customPersona')?.value || '').trim();
  } else if (stepIdx === 4) {
    cfg.director_name = (document.getElementById('directorName')?.value || '').trim() || 'Director';
    cfg.director_about = (document.getElementById('directorAbout')?.value || '').trim();
    cfg.notification_email = (document.getElementById('notificationEmail')?.value || '').trim();
    cfg.notification_phone = (document.getElementById('notificationPhone')?.value || '').trim();
  } else if (stepIdx === 5) {
    cfg.email_username  = (document.getElementById('emailUsername')?.value || '').trim();
    cfg.email_password  = (document.getElementById('emailPassword')?.value || '').trim();
    cfg.email_smtp_host = (document.getElementById('emailSmtpHost')?.value || '').trim() || 'smtp.gmail.com';
    cfg.email_smtp_port = parseInt(document.getElementById('emailSmtpPort')?.value || '465', 10) || 465;
  }
}

async function next() {
  saveStepInputs();
  if (stepIdx < TOTAL_STEPS - 1) {
    stepIdx++;
    renderStep();
    return;
  }
  // Finish — save config and route to splash → app.
  const btn = document.getElementById('nextBtn');
  btn.disabled = true;
  btn.innerHTML = '<span style="opacity:.8">Saving…</span>';
  try {
    await api.saveManagerConfig(cfg);
    if (window.toast) toast('success', 'Setup complete', `${cfg.manager_name} is ready.`, 2500);
    setTimeout(() => window.location.replace('/splash'), 700);
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = '✨ Finish setup';
    const card = document.querySelector('.step-card');
    const banner = document.createElement('div');
    banner.className = 'banner show error';
    banner.textContent = `Could not save: ${e.message}`;
    card.insertBefore(banner, card.firstChild);
  }
}

function initials(name) {
  return (name || 'A').trim().split(/\s+/).slice(0,2).map(p => p[0] || '').join('').toUpperCase().slice(0,2) || 'A';
}
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function currentPersonaText() {
  // What the personality textarea should be pre-filled with: their custom edit
  // if they have one, otherwise the selected preset's starting prompt.
  if ((cfg.manager_persona || '').trim()) return cfg.manager_persona;
  const preset = (presets || []).find(p => p.key === cfg.persona_key);
  return (preset?.system || '').trim();
}

renderStep();
</script>
<script src="/static/polish/global-polish.v2.js?v=v17"></script>
</body>
