<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Forgot password · Metis</title>
<link rel="icon" href="../assets/favicon.svg">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="auth-shared.css">
<style>
.sent-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; display: none; }
.sent-card.show { display: block; animation: fadeIn .4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.sent-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--energy-soft); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; }
.sent-icon svg { width: 24px; height: 24px; stroke: var(--energy); stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.sent-card h3 { font-family: var(--font-display); font-size: 18px; font-weight: 650; margin: 0 0 6px; }
.sent-card p { font-size: 13.5px; color: var(--text-muted); line-height: 1.55; margin: 0 0 14px; }
.sent-card .email-pill { display: inline-block; padding: 4px 10px; background: var(--surface-alt); border-radius: 6px; font-family: var(--font-mono); font-size: 12px; color: var(--text); }
.sent-card .resend { font-size: 12.5px; color: var(--text-muted); margin-top: 14px; }
.sent-card .resend button { background: none; border: none; color: var(--heritage-violet); font-weight: 600; cursor: pointer; font-family: inherit; font-size: inherit; padding: 0; }
.sent-card .resend button:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="titlebar"><div class="traffic"><span class="r"></span><span class="y"></span><span class="g"></span></div><div class="title">metis · reset password</div><div style="width:56px"></div></div>

<a class="auth-watermark" href="../onboarding/index.html"><img src="../assets/metis-mark-starburst.svg" alt=""><span class="wm">Met<em>i</em>s</span></a>
<a class="auth-back" href="login.html">← Back to sign in</a>

<main class="auth-stage">
  <div class="auth-card">
    <h1>Reset your <em>password</em></h1>
    <p class="sub">Enter the email you signed up with. We'll send a link to set a new password.</p>

    <form id="resetForm" autocomplete="on">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email">
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">
        Send reset link
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 5l7 7-7 7"/></svg>
      </button>
    </form>

    <div id="sentCard" class="sent-card" style="margin-top: 22px;">
      <div class="sent-icon"><svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg></div>
      <h3>Check your inbox</h3>
      <p>We sent a reset link to <span class="email-pill" id="sentEmail">—</span>. The link expires in 30 minutes.</p>
      <p class="resend">Didn't get it? <button id="resendBtn">Send again</button></p>
    </div>

    <div class="toggle">Remembered it? <a href="login.html">Back to sign in</a></div>
  </div>
</main>

<script>
document.getElementById('resetForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const email = document.getElementById('email').value;
  btn.style.opacity = '.7';
  btn.firstChild.textContent = 'Sending ';
  setTimeout(() => {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('sentEmail').textContent = email;
    document.getElementById('sentCard').classList.add('show');
  }, 700);
});
document.getElementById('resendBtn')?.addEventListener('click', () => {
  const btn = document.getElementById('resendBtn');
  btn.textContent = 'Sent ✓';
  btn.disabled = true;
  setTimeout(() => { btn.textContent = 'Send again'; btn.disabled = false; }, 3000);
});
</script>

</body>
</html>
