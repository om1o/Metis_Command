<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Set a new password · Metis</title>
<link rel="icon" href="../assets/favicon.svg">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="auth-shared.css">
</head>
<body>

<div class="titlebar"><div class="traffic"><span class="r"></span><span class="y"></span><span class="g"></span></div><div class="title">metis · set new password</div><div style="width:56px"></div></div>

<a class="auth-watermark" href="../onboarding/index.html"><img src="../assets/metis-mark-starburst.svg" alt=""><span class="wm">Met<em>i</em>s</span></a>

<main class="auth-stage">
  <div class="auth-card">
    <h1>Set a <em>new password</em></h1>
    <p class="sub">Pick something strong — at least 8 characters, mix in a number or symbol.</p>

    <form id="newPwForm">
      <div class="field">
        <label for="pw1">New password</label>
        <input type="password" id="pw1" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
        <div class="strength" id="strengthMeter"><i></i><i></i><i></i><i></i></div>
        <div class="strength-label" id="strengthLabel">Strength · enter a password</div>
      </div>
      <div class="field">
        <label for="pw2">Confirm new password</label>
        <input type="password" id="pw2" placeholder="Type it again" required minlength="8" autocomplete="new-password">
        <div class="strength-label" id="matchLabel" style="visibility:hidden">Passwords match</div>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn" disabled>
        Save & sign in
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 5l7 7-7 7"/></svg>
      </button>
    </form>

    <div class="toggle"><a href="login.html">← Back to sign in</a></div>
  </div>
</main>

<script>
const pw1 = document.getElementById('pw1');
const pw2 = document.getElementById('pw2');
const meter = document.getElementById('strengthMeter');
const meterLabel = document.getElementById('strengthLabel');
const matchLabel = document.getElementById('matchLabel');
const btn = document.getElementById('submitBtn');
const labels = ['enter a password', 'weak', 'fair', 'good', 'strong'];
function score(p){let s=0;if(p.length>=8)s++;if(p.length>=12)s++;if(/[A-Z]/.test(p)&&/[a-z]/.test(p))s++;if(/\d/.test(p)&&/[^A-Za-z0-9]/.test(p))s++;return s;}
function update() {
  const s = pw1.value ? score(pw1.value) : 0;
  meter.className = 'strength s' + s;
  meterLabel.textContent = 'Strength · ' + labels[s];
  const match = pw1.value && pw2.value && pw1.value === pw2.value;
  if (pw2.value) {
    matchLabel.style.visibility = 'visible';
    if (match) { matchLabel.textContent = '✓ Passwords match'; matchLabel.style.color = 'var(--energy)'; }
    else { matchLabel.textContent = '✗ Passwords don\'t match'; matchLabel.style.color = 'var(--error)'; }
  } else { matchLabel.style.visibility = 'hidden'; }
  btn.disabled = !(s >= 1 && match);
}
pw1.addEventListener('input', update);
pw2.addEventListener('input', update);
document.getElementById('newPwForm').addEventListener('submit', (e) => {
  e.preventDefault();
  btn.style.opacity = '.7';
  btn.firstChild.textContent = 'Saving ';
  setTimeout(() => { window.location.href = '../ui_kits/metis-app/index.html'; }, 700);
});
</script>

</body>
</html>
