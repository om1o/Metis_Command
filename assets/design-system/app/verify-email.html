<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Verify your email · Metis</title>
<link rel="icon" href="../assets/favicon.svg">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="auth-shared.css">
<style>
.envelope { width: 96px; height: 96px; margin: 0 auto 28px; position: relative; }
.envelope svg { width: 100%; height: 100%; animation: float 3.5s ease-in-out infinite; }
.envelope::before, .envelope::after { content: ""; position: absolute; inset: -16px; border-radius: 50%; border: 2px solid var(--heritage-violet); opacity: 0; animation: ringExpand 2.4s var(--ease-out) infinite; }
.envelope::after { animation-delay: 1.2s; }
@keyframes ringExpand { 0% { transform: scale(.85); opacity: .6; border-color: var(--heritage-coral); } 100% { transform: scale(1.4); opacity: 0; border-color: var(--heritage-violet); } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.center { text-align: center; }
.code-input { display: flex; gap: 10px; justify-content: center; margin: 28px 0 8px; }
.code-input input { width: 52px; height: 60px; text-align: center; font-family: var(--font-display); font-size: 24px; font-weight: 650; border: 2px solid var(--border); border-radius: 12px; background: var(--surface); color: var(--text); transition: all .15s; }
.code-input input:hover { border-color: var(--border-strong); }
.code-input input:focus { outline: none; border-color: var(--heritage-violet); box-shadow: 0 0 0 4px rgba(124,58,237,.15); }
.code-input input.filled { border-color: var(--heritage-violet); background: linear-gradient(135deg, rgba(251,113,133,.05) 0%, rgba(124,58,237,.05) 100%); }
.code-helper { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); text-align: center; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 12px; }
.email-display { display: inline-block; padding: 4px 10px; background: var(--surface-alt); border-radius: 6px; font-family: var(--font-mono); font-size: 12px; color: var(--text); margin: 0 4px; }
.action-row { margin-top: 32px; display: flex; flex-direction: column; gap: 8px; align-items: center; font-size: 13px; color: var(--text-muted); }
.action-row button { background: none; border: none; color: var(--heritage-violet); font-weight: 600; cursor: pointer; font-family: inherit; font-size: 13px; padding: 0; }
.action-row button:hover { text-decoration: underline; }
.action-row button:disabled { color: var(--text-subtle); cursor: not-allowed; text-decoration: none; }
</style>
</head>
<body>

<div class="titlebar"><div class="traffic"><span class="r"></span><span class="y"></span><span class="g"></span></div><div class="title">metis · verify email</div><div style="width:56px"></div></div>

<a class="auth-watermark" href="../onboarding/index.html"><img src="../assets/metis-mark-starburst.svg" alt=""><span class="wm">Met<em>i</em>s</span></a>

<main class="auth-stage">
  <div class="auth-card center">
    <div class="envelope">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="2" y="5" width="20" height="14" rx="3" fill="url(#g1)" stroke="#6D28D9" stroke-width="1.4"/>
        <path d="M2.5 7l9.5 7 9.5-7" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FB7185"/><stop offset=".5" stop-color="#C026D3"/><stop offset="1" stop-color="#6D28D9"/></linearGradient></defs>
      </svg>
    </div>

    <h1>Check your <em>email</em></h1>
    <p class="sub">We sent a 6-digit code to <span class="email-display" id="emailDisplay">you@company.com</span>. Enter it below to verify your account.</p>

    <div class="code-input" id="codeInput">
      <input maxlength="1" inputmode="numeric" autocomplete="one-time-code">
      <input maxlength="1" inputmode="numeric">
      <input maxlength="1" inputmode="numeric">
      <input maxlength="1" inputmode="numeric">
      <input maxlength="1" inputmode="numeric">
      <input maxlength="1" inputmode="numeric">
    </div>
    <div class="code-helper" id="codeHelper">— — — — — —</div>

    <div class="action-row">
      <div>Didn't get it? <button id="resendBtn">Resend code</button></div>
      <div>Wrong email? <a href="signup.html" style="color: var(--heritage-violet); font-weight: 600; text-decoration: none;">Edit it</a></div>
    </div>
  </div>
</main>

<script>
const inputs = document.querySelectorAll('#codeInput input');
const helper = document.getElementById('codeHelper');
inputs.forEach((inp, i) => {
  inp.addEventListener('input', () => {
    inp.value = inp.value.replace(/\D/g, '');
    if (inp.value) inp.classList.add('filled'); else inp.classList.remove('filled');
    if (inp.value && i < inputs.length - 1) inputs[i+1].focus();
    const code = [...inputs].map(x => x.value).join('');
    helper.textContent = code.length === 6 ? 'Verifying ' + code : '— — — — — —';
    if (code.length === 6) {
      helper.style.color = 'var(--heritage-violet)';
      setTimeout(() => { window.location.href = '../onboarding/setup.html'; }, 700);
    }
  });
  inp.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i-1].focus();
  });
  inp.addEventListener('paste', (e) => {
    const txt = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
    if (txt) {
      e.preventDefault();
      [...txt].forEach((c, idx) => { if (inputs[idx]) { inputs[idx].value = c; inputs[idx].classList.add('filled'); } });
      inputs[Math.min(txt.length, 5)].focus();
      helper.textContent = 'Verifying ' + txt;
      helper.style.color = 'var(--heritage-violet)';
      setTimeout(() => { window.location.href = '../onboarding/setup.html'; }, 700);
    }
  });
});
inputs[0].focus();

document.getElementById('resendBtn').addEventListener('click', (e) => {
  const btn = e.target;
  btn.textContent = 'Sent ✓';
  btn.disabled = true;
  setTimeout(() => { btn.textContent = 'Resend code'; btn.disabled = false; }, 3000);
});
</script>

</body>
</html>
