<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 22px 24px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.sw { height: 70px; border-radius: var(--radius-md); border: 1px solid var(--border); }
.n { font-size: 12px; font-weight: 600; color: var(--text); margin-top: 8px; }
.h { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
.r { font-size: 11px; color: var(--text-subtle); }
</style></head><body>
<div class="grid">
  <div><div class="sw" style="background:#22C55E"></div><div class="n">Energy</div><div class="h">#22C55E</div><div class="r">Synced, success</div></div>
  <div><div class="sw" style="background:#F59E0B"></div><div class="n">Warning</div><div class="h">#F59E0B</div><div class="r">Caution, retry</div></div>
  <div><div class="sw" style="background:#EF4444"></div><div class="n">Error</div><div class="h">#EF4444</div><div class="r">Failed, destructive</div></div>
  <div><div class="sw" style="background:#0EA5E9"></div><div class="n">Info</div><div class="h">#0EA5E9</div><div class="r">Notices</div></div>
  <div><div class="sw" style="background:#DCFCE7"></div><div class="n">Energy soft</div><div class="h">#DCFCE7</div><div class="r">Status chip bg</div></div>
  <div><div class="sw" style="background:#FEF3C7"></div><div class="n">Warning soft</div><div class="h">#FEF3C7</div><div class="r">Status chip bg</div></div>
  <div><div class="sw" style="background:#FEE2E2"></div><div class="n">Error soft</div><div class="h">#FEE2E2</div><div class="r">Status chip bg</div></div>
  <div><div class="sw" style="background:#E0F2FE"></div><div class="n">Info soft</div><div class="h">#E0F2FE</div><div class="r">Status chip bg</div></div>
</div>
</body></html>
