<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 28px 28px 32px; background: var(--bg); }
.row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
.cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.box { width: 100%; height: 56px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); }
.b1 { box-shadow: var(--shadow-xs); } .b2 { box-shadow: var(--shadow-sm); }
.b3 { box-shadow: var(--shadow-md); } .b4 { box-shadow: var(--shadow-lg); }
.b5 { box-shadow: var(--shadow-xl); }
.t { font-family: var(--font-mono); font-size: 11px; color: var(--text); }
.s { font-size: 11px; color: var(--text-subtle); text-align: center; }
</style></head><body>
<div class="row">
  <div class="cell"><div class="box b1"></div><div class="t">shadow-xs</div><div class="s">resting hairline</div></div>
  <div class="cell"><div class="box b2"></div><div class="t">shadow-sm</div><div class="s">controls</div></div>
  <div class="cell"><div class="box b3"></div><div class="t">shadow-md</div><div class="s">cards</div></div>
  <div class="cell"><div class="box b4"></div><div class="t">shadow-lg</div><div class="s">menus, hover</div></div>
  <div class="cell"><div class="box b5"></div><div class="t">shadow-xl</div><div class="s">modals, sheets</div></div>
</div>
</body></html>
