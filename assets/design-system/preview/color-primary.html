<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 22px 24px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.cell { }
.sw { height: 70px; border-radius: var(--radius-md); border: 1px solid var(--border); }
.n { font-size: 12px; font-weight: 600; color: var(--text); margin-top: 8px; }
.h { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
.r { font-size: 11px; color: var(--text-subtle); }
</style></head><body>
<div class="grid">
  <div class="cell"><div class="sw" style="background:#2563EB"></div><div class="n" style="color:#fff;mix-blend-mode:difference;display:none"></div><div class="n">Primary</div><div class="h">#2563EB</div><div class="r">Actions, links</div></div>
  <div class="cell"><div class="sw" style="background:#1D4ED8"></div><div class="n">Primary hover</div><div class="h">#1D4ED8</div><div class="r">Hover state</div></div>
  <div class="cell"><div class="sw" style="background:#1E40AF"></div><div class="n">Primary press</div><div class="h">#1E40AF</div><div class="r">Active / pressed</div></div>
  <div class="cell"><div class="sw" style="background:#DBEAFE"></div><div class="n">Primary soft</div><div class="h">#DBEAFE</div><div class="r">Tinted bg, chips</div></div>
</div>
</body></html>
