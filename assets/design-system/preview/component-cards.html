<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 22px 24px; background: var(--bg); }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow-sm); padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.card.hover { box-shadow: var(--shadow-md); transform: translateY(-2px); border-color: var(--border-strong); }
.head { display: flex; justify-content: space-between; align-items: center; }
.title { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--text); }
.meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
.foot { display: flex; gap: 8px; align-items: center; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.chip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; background: #DCFCE7; color: #15803D; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: #22C55E; }
.iconbox { width: 32px; height: 32px; border-radius: 9px; background: var(--primary-soft); color: var(--primary-press); display: flex; align-items: center; justify-content: center; }
.l { font-size: 11px; font-family: var(--font-mono); color: var(--text-subtle); position: absolute; }
</style></head><body>
<div class="grid">
  <div class="card">
    <div class="head"><div class="iconbox"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div><span class="chip"><span class="dot"></span>Saved</span></div>
    <div class="title">leads_q2.csv</div>
    <div class="meta">28 KB · 142 rows</div>
    <div class="foot">run_a91f4c · 2m ago</div>
  </div>
  <div class="card hover">
    <div class="head"><div class="iconbox" style="background:#FEF3C7;color:#B45309"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><span class="chip" style="background:#FEF3C7;color:#B45309"><span class="dot" style="background:#F59E0B"></span>Running</span></div>
    <div class="title">Outreach mission</div>
    <div class="meta">Step 3 of 7 · researching</div>
    <div class="foot">run_b2c81d · started 14s ago</div>
  </div>
</div>
</body></html>
