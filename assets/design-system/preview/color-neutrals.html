<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 22px 24px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.sw { height: 70px; border-radius: var(--radius-md); border: 1px solid var(--border); }
.n { font-size: 12px; font-weight: 600; color: var(--text); margin-top: 8px; }
.h { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
.r { font-size: 11px; color: var(--text-subtle); }
</style></head><body>
<div class="grid">
  <div><div class="sw" style="background:#F7FAFC"></div><div class="n">Background</div><div class="h">#F7FAFC</div><div class="r">Page bg</div></div>
  <div><div class="sw" style="background:#FFFFFF"></div><div class="n">Surface</div><div class="h">#FFFFFF</div><div class="r">Cards, sheets</div></div>
  <div><div class="sw" style="background:#F1F5F9"></div><div class="n">Surface alt</div><div class="h">#F1F5F9</div><div class="r">Wells, code bg</div></div>
  <div><div class="sw" style="background:#E2E8F0"></div><div class="n">Border</div><div class="h">#E2E8F0</div><div class="r">Hairlines</div></div>
  <div><div class="sw" style="background:#0F172A"></div><div class="n">Text</div><div class="h">#0F172A</div><div class="r">Primary text</div></div>
  <div><div class="sw" style="background:#475569"></div><div class="n">Text muted</div><div class="h">#475569</div><div class="r">Secondary</div></div>
  <div><div class="sw" style="background:#94A3B8"></div><div class="n">Text subtle</div><div class="h">#94A3B8</div><div class="r">Captions, hints</div></div>
  <div><div class="sw" style="background:#CBD5E1"></div><div class="n">Border strong</div><div class="h">#CBD5E1</div><div class="r">Dividers, hover</div></div>
</div>
</body></html>
