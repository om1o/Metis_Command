<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
body { padding: 24px 28px; }
.hero { height: 200px; border-radius: var(--radius-xl); background: linear-gradient(135deg, #FB7185 0%, #C026D3 45%, #6D28D9 100%); display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--font-display); font-weight: 800; font-size: 48px; letter-spacing: -0.02em; box-shadow: var(--shadow-lg); }
.note { margin-top: 14px; font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; flex-wrap: wrap; }
.note code { font-family: var(--font-mono); font-size: 11px; color: var(--text); background: var(--surface-alt); padding: 2px 6px; border-radius: 4px; }
</style></head><body>
<div class="hero">Heritage</div>
<div class="note">
  <span><code>--heritage-grad</code></span>
  <span>#FB7185 → #C026D3 → #6D28D9</span>
  <span>Logomark, auth hero, "shipped" celebration. Never on buttons.</span>
</div>
</body></html>
