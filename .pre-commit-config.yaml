# Pre-commit hooks for Metis Command.
#
# Install (one-time):
#     pip install pre-commit
#     pre-commit install
#
# Then every `git commit` runs these hooks on staged files.
# Force a full run: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: local
    hooks:
      - id: metis-secret-scan
        name: Metis secret scan (safety.secret_scan)
        entry: python scripts/pre_commit_secret_scan.py
        language: system
        pass_filenames: true
        types: [text]
